<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./src/output.css" rel="stylesheet" />
  </head>
  <title>Nexcent</title>
  <body>
    <div class="w-full bg-gradient-to-b from-gray-100 to-gray-100">
      <!-- Navbar -->
      <nav
        class="section-container flex justify-between items-center h-20 bg-transparent"
      >
        <div class="">
          <a href="#"><img src="./asset/Logo.png" alt="" /></a>
        </div>
        <div class="hidden lg:block">
          <ul
            class="flex flex-row items-center space-x-10 font-medium text-gray-600"
          >
            <li>
              <a href="#" class="hover:text-primary transition duration-200"
                >Home</a
              >
            </li>
            <li>
              <a href="#" class="hover:text-primary transition duration-200"
                >Service</a
              >
            </li>
            <li>
              <a href="#" class="hover:text-primary transition duration-200"
                >Feature</a
              >
            </li>
            <li>
              <a href="#" class="hover:text-primary transition duration-200"
                >Product</a
              >
            </li>
            <li>
              <a href="#" class="hover:text-primary transition duration-200"
                >Testimonial</a
              >
            </li>
            <li>
              <a href="#" class="hover:text-primary transition duration-200"
                >FAQ</a
              >
            </li>
          </ul>
        </div>
        <div class="block lg:hidden">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-6"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
            />
          </svg>
        </div>
        <div class="hidden lg:flex flex-row items-center space-x-6">
          <a href="#" class="text-primary transition duration-200 font-medium"
            >Login</a
          >
          <a
            href="#"
            class="bg-primary text-white px-4 rounded-md py-2 font-medium hover:bg-primary transition duration-200"
            >Sign up</a
          >
        </div>
      </nav>
      <!-- Navbar -->

      <!-- Hero Section -->
      <section class="section-container py-10 lg:py-18">
        <div class="flex flex-col sm:flex-row items-start lg:items-center">
          <div class="w-full md:w-2/3">
            <h1 class="text-5xl md:text-6xl font-semibold text-gray-600">
              Lessons and insights
              <span class="text-primary">from 8 years</span>
            </h1>
            <p class="text-gray-600 my-6 mb-10">
              Where to grow your business as a photographer: site or social
              media?
            </p>
            <a
              href="#"
              class="bg-primary text-white px-6 rounded-md py-3 font-medium hover:bg-primary transition duration-200"
              >Register</a
            >
          </div>
          <div class="hidden md:block md:w-1/3 right">
            <img src="./asset/Illustration.png" alt="" />
          </div>
        </div>
      </section>
      <!-- Hero Section -->

      <div class="hidden md:flex items-center justify-center pb-4">
        <ul class="flex flex-row space-x-2">
          <li class="h-2.5 w-2.5 bg-primary rounded-full"></li>
          <li class="h-2.5 w-2.5 bg-secondary rounded-full"></li>
          <li class="h-2.5 w-2.5 bg-secondary rounded-full"></li>
        </ul>
      </div>
    </div>
  </body>
</html>
